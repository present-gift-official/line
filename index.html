<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEアプリを開く</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff; color: #333; }
        .logo { width: 88px; height: 88px; margin-bottom: 24px; }
        .text { font-size: 19px; font-weight: bold; text-align: center; line-height: 1.6; margin-bottom: 40px; }
        .btn { background-color: #06C755; color: white; padding: 16px 0; width: 280px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 17px; margin-bottom: 16px; border: none; cursor: pointer; text-align: center; display: block; }
        .btn-sub { color: #888; text-decoration: none; font-size: 14px; border: 1px solid #ddd; padding: 12px 0; width: 280px; border-radius: 8px; text-align: center; display: block; }
        .loading-dots { font-size: 12px; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="logo" alt="LINE">
    <div class="text">LINEアプリを開いて<br>続行して下さい。</div>
    
    <a href="https://lin.ee/z0cMQLj" class="btn">LINEアプリを開く！</a>
    <a href="https://lin.ee/z0cMQLj" class="btn-sub">LINEアプリをダウンロード</a>

    <p class="loading-dots" id="statusText">自動で移動しない場合はボタンを押してください</p>

    <script>
        window.onload = function() {
            // パラメータなしの正しいURL
            const lineUrl = "https://lin.ee/z0cMQLj";
            
            // URLのハッシュを見て、すでにリダイレクト処理をしたか判定する
            if (window.location.hash !== '#redirected') {
                // ハッシュを追加して「処理済み」の目印をつける
                window.location.replace(window.location.pathname + window.location.search + '#redirected');
                
                setTimeout(function() {
                    window.location.href = lineUrl;
                }, 500);
            } else {
                // 戻るボタン等で戻ってきた場合（ハッシュがついている場合）は自動で飛ばさない
                document.getElementById('statusText').innerText = "ボタンを押してLINEを追加してください";
            }
        };
    </script>
</body>
</html>
