<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEアプリを起動</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8f9fa; color: #333; }
        .container { width: 90%; max-width: 400px; text-align: center; background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { width: 80px; margin-bottom: 20px; }
        .text { font-size: 18px; font-weight: bold; line-height: 1.5; margin-bottom: 30px; }
        .btn { background-color: #06C755; color: white; padding: 18px; width: 100%; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; display: block; box-sizing: border-box; transition: 0.3s; border: none; }
        
        /* TikTokブラウザ専用の案内表示（最初は非表示） */
        #tiktok-guide { display: none; margin-top: 20px; padding: 15px; background: #fff3f3; border: 2px solid #ff4d4d; border-radius: 10px; color: #ff4d4d; font-size: 14px; font-weight: bold; }
        .arrow { font-size: 24px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="logo">
    <div class="text">LINEアプリを起動して<br>友だち追加を完了してください</div>

    <a href="javascript:void(0);" onclick="forceOpenLINE()" class="btn">LINEを開く（ここをタップ）</a>

    <div id="tiktok-guide">
        <div class="arrow">↑↑↑</div>
        LINEが開かない場合は、右上の「...」をタップして<br>
        「ブラウザで開く」または「Safari/Chromeで開く」を選択してください
    </div>
</div>

<script>
    // 【重要】IDが変わったらここだけ直せばOK
    const LINE_ID = "@257pbiqz";

    function forceOpenLINE() {
        // LINEアプリを直接呼び出す特別なURL（スキーム）
        const schemeUrl = "line://ti/p/" + LINE_ID;
        const webUrl = "https://line.me/R/ti/p/" + LINE_ID;

        // 1. まずアプリ起動を試みる
        window.location.href = schemeUrl;

        // 2. 0.5秒後に予備のURLを試みる
        setTimeout(() => {
            window.location.href = webUrl;
        }, 500);

        // 3. それでもダメな場合（TikTokにブロックされた場合）は案内を表示
        setTimeout(() => {
            document.getElementById('tiktok-guide').style.display = 'block';
        }, 1500);
    }

    // ページ読み込み時に自動でも一回だけ試みる
    window.onload = function() {
        if (!window.location.hash.includes('retry')) {
            window.location.hash = "retry";
            // 自動起動を試みる（TikTokではブロックされやすいが念のため）
            forceOpenLINE();
        }
    };
</script>

</body>
</html>
