<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
</head>
<body>
<script>
    var id = "@257pbiqz";
    var ua = navigator.userAgent.toLowerCase();
    
    if (ua.indexOf("android") > -1) {
        // Android：TikTokのブロック判定をズラすため、0.1秒だけ遅延させてIntentを発射
        setTimeout(function() {
            window.location.href = "intent://ti/p/" + id + "#Intent;scheme=line;package=jp.naver.line.android;end";
        }, 100);
    } else {
        // iOS：ここが成功サイトの最大の裏技。
        // ページ全体を移動させず、見えない「透明な小窓」を作ってLINEを起動させる
        var iframe = document.createElement("iframe");
        iframe.style.display = "none"; // 完全に見えなくする
        iframe.src = "line://ti/p/" + id;
        document.body.appendChild(iframe);
        
        // 念のための予備動作（小窓が失敗した場合のみ作動）
        setTimeout(function() {
            window.location.href = "line://ti/p/" + id;
        }, 300);
    }
</script>
</body>
</html>
