<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEアプリを起動中...</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loading { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; background: #06C755; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="loading">
    <div class="spinner"></div>
    <p>LINEアプリを起動しています...<br>画面が変わらない場合は下のボタンを押してください</p>
    
    <a href="https://line.me/R/ti/p/@257pbiqz" id="manualLink" class="btn">LINEを開く♡</a>
</div>

<script>
    (function() {
        // ★IDが変わったらここを修正（2箇所目）
        const LINE_ID = "@257pbiqz";
        
        const ua = navigator.userAgent.toLowerCase();
        const isAndroid = ua.indexOf("android") > -1;
        
        // Android用の特殊な強制起動命令（Intent）
        const androidIntent = "intent://ti/p/" + LINE_ID + "#Intent;scheme=line;package=jp.naver.line.android;end";
        // iPhone用の強制起動命令
        const iosScheme = "line://ti/p/" + LINE_ID;
        // 最終的な予備URL
        const webFallback = "https://line.me/R/ti/p/" + LINE_ID;

        function redirect() {
            if (isAndroid) {
                // AndroidはIntentを使うとTikTokのガードを突き破りやすい
                location.href = androidIntent;
                setTimeout(function() { location.replace(webFallback); }, 500);
            } else {
                // iPhoneはURLスキームを直接叩く
                location.href = iosScheme;
                setTimeout(function() { location.replace(webFallback); }, 500);
            }
        }

        // ページを読み込んだ瞬間に実行
        window.onload = function() {
            // ループ防止用のフラグ管理
            if (!sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                redirect();
            }
        };

        // ボタンのリンク先も動的にセット
        document.getElementById('manualLink').href = isAndroid ? androidIntent : iosScheme;
    })();
</script>

</body>
</html>
