<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0;URL='line://ti/p/@257pbiqz'">
    <script>
        (function() {
            const lineId = "@257pbiqz";
            const ua = navigator.userAgent.toLowerCase();

            // 2. Android用の最強命令（Intent）
            // これが「緑の確認画面」を完全に消してアプリへ直撃させる鍵です
            const androidIntent = "intent://ti/p/" + lineId + "#Intent;scheme=line;package=jp.naver.line.android;end";
            
            // 3. iPhone用の強制スキーム（Metaタグが効かなかった時の保険）
            const iosScheme = "line://ti/p/" + lineId;

            function forceJump() {
                if (ua.indexOf("android") > -1) {
                    // Android：Intentを投げてTikTokブラウザのガードを破壊し、アプリへ直行
                    location.replace(androidIntent);
                } else {
                    // iOS：カスタムスキームで確認画面を飛ばして直接アプリへ
                    location.replace(iosScheme);
                }
            }

            // ページが描画される「前」に実行
            forceJump();

            // 万が一、1回目で反応しなかった時のための「連打」
            setTimeout(forceJump, 100);
            setTimeout(forceJump, 250);
        })();
    </script>
</head>
<body style="background-color: #ffffff;">
    </body>
</html>
