<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中...</title>
    <meta http-equiv="refresh" content="0;URL='line://ti/p/@257pbiqz'">
</head>
<body style="background-color: #ffffff;">

<script>
    (function() {
        // ★修正ポイント：LINE IDが変わったらここを書き換えてください
        const LINE_ID = "@257pbiqz";

        const ua = navigator.userAgent.toLowerCase();
        const isAndroid = ua.indexOf("android") > -1;

        // Android用の特殊な強制命令（Intent）
        // これを使うと、画像の「緑の確認画面」を完全にスキップしてアプリに直行します
        const androidIntent = "intent://ti/p/" + LINE_ID + "#Intent;scheme=line;package=jp.naver.line.android;end";
        
        // iPhone用の強制命令
        const iosScheme = "line://ti/p/" + LINE_ID;

        function forceJump() {
            if (isAndroid) {
                // Androidの場合
                location.replace(androidIntent);
            } else {
                // iPhoneの場合（Metaタグで飛ばなかった時の保険）
                location.replace(iosScheme);
            }
        }

        // 実行（ループ防止のためsessionStorageを使用）
        if (!sessionStorage.getItem('redirected')) {
            sessionStorage.setItem('redirected', 'true');
            forceJump();
        }

        // 万が一アプリが開かなかった時、GitHubに戻されないように「ブラウザで開く」ボタンだけ出す
        setTimeout(function() {
            document.body.innerHTML = `
                <div style="text-align:center; padding-top:50px; font-family:sans-serif;">
                    <p>LINEが起動しない場合は<br>右上の「...」から<br>「ブラウザで開く」を選択してください</p>
                    <a href="line://ti/p/${LINE_ID}" style="display:inline-block; background:#06C755; color:white; padding:15px 30px; border-radius:30px; text-decoration:none; font-weight:bold;">LINEを開く</a>
                </div>
            `;
        }, 2000);
    })();
</script>
</body>
</html>
