<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中...</title>
    <script>
        // ★IDが変わったらここを書き換えてください
        const line_id = "@257pbiqz";

        (function() {
            const ua = navigator.userAgent.toLowerCase();
            
            // 1. 各デバイス用のURLを作成
            // iPhone用（スキーム直撃）
            const ios_url = "line://ti/p/" + line_id;
            // Android用（Intent直撃：これが最強の突破方法です）
            const android_url = "intent://ti/p/" + line_id + "#Intent;scheme=line;package=jp.naver.line.android;end";
            // 万が一の予備（ユニバーサルリンク）
            const web_url = "https://line.me/R/ti/p/" + line_id;

            // 2. 実行関数
            function launch() {
                if (ua.indexOf("android") > -1) {
                    // Android：Intentを投げてTikTokブラウザのガードを破壊
                    location.replace(android_url);
                } else {
                    // iOS：カスタムスキームで強制起動
                    location.replace(ios_url);
                    
                    // 0.5秒後に予備リンクへ（アプリが入っていない場合用）
                    setTimeout(function() {
                        location.replace(web_url);
                    }, 500);
                }
            }

            // 3. ページを読み込む「前」に実行を開始
            launch();
        })();
    </script>
</head>
<body style="background-color: #ffffff;">
    </body>
</html>
