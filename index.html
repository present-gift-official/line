<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEアプリを開く</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; }
        .text { font-size: 18px; font-weight: bold; text-align: center; line-height: 1.5; margin-bottom: 30px; color: #333; }
        .btn { background-color: #06C755; color: white; padding: 15px 80px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 18px; margin-bottom: 20px; border: none; cursor: pointer; }
        .btn-sub { color: #888; text-decoration: none; font-size: 14px; border: 1px solid #ddd; padding: 10px 40px; border-radius: 8px; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="logo" alt="LINE">
    <div class="text">LINEアプリを開いて<br>続行して下さい。</div>
    
    <a href="https://lin.ee/z0cMQLj" class="btn">LINEアプリを開く</a>
    <a href="https://lin.ee/z0cMQLj" class="btn-sub">LINEアプリをダウンロード</a>

    <script>
        // ページが表示された瞬間にLINEアプリの起動（ディープリンク）を試みる
        window.onload = function() {
            // 0.5秒後に自動でLINEアプリを呼び出す
            setTimeout(function() {
                window.location.href = "line://ti/p/z0cMQLj";
            }, 500);
        };
    </script>
</body>
</html>
